#-------------------------
#Docker Set Up for Deployment

spring.application.name=WorkTrackerD424

# Use env vars when deployed (AWS/containers), fall back to local defaults
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/worktracker}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:worktracker_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:worktracker_pass}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true

server.port=${SERVER_PORT:8080}
