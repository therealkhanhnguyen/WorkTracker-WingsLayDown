#setting up for AWS Beanstalk
services:
  backend:
    build: ./BackEnd/WorkTrackerD424
    container_name: worktracker-backend
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SERVER_PORT: 8080
    ports:
      - "8080:8080"

  frontend:
    build: ./FrontEnd
    container_name: worktracker-frontend
    depends_on:
      - backend
    ports:
      - "80:80"