<div style="max-width: 360px; margin: 48px auto; padding: 16px; border: 1px solid #ddd; border-radius: 8px;">
      <h2 style="margin: 0 0 12px;">WorkTracker Login</h2>

      <form (ngSubmit)="onLogin()">
        <label style="display:block; margin: 8px 0 4px;">Username</label>
        <input [(ngModel)]="username" name="username" required
               style="width:100%; padding:8px; box-sizing:border-box;" />

        <label style="display:block; margin: 12px 0 4px;">Password</label>
        <input [(ngModel)]="password" name="password" type="password" required
               style="width:100%; padding:8px; box-sizing:border-box;" />

        <button type="submit" style="margin-top: 16px; width:100%; padding:10px;">
          Login
        </button>

        <p *ngIf="error" style="color:#b00020; margin-top: 12px;">
          {{ error }}
        </p>

        <p style="margin-top: 12px; font-size: 12px; opacity: 0.8;">
          For capstone demo. Please enter: <br />
          <b>shopfloor</b> / <b>shopfloor123</b>
        </p>
      </form>
    </div>
