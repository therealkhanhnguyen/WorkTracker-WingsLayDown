<h1 class="title">WorkTracker Dashboard</h1>

<div class="layout">
  <!-- LEFT: Wing sections list -->
  <section class="panel">
    <h2>Wing Sections</h2>

    <ul class="list">
      <li *ngFor="let ws of wingSections()">
        <button
          class="list-item"
          [class.selected]="isSelected(ws)"
          (click)="selectById(ws.id)">
          <strong>{{ ws.id }}</strong> — {{ ws.name }}
        </button>
      </li>
    </ul>
  </section>

  <!-- RIGHT: SVG -->
  <section class="panel svg-panel">
    <h2>Wing Map</h2>

    <svg viewBox="0 0 900 360" class="wing-svg">
      <!-- Outer frame -->
      <rect x="20" y="40" width="860" height="280" class="frame"></rect>

      <!-- Render one SVG region per WingSection -->
      <ng-container *ngFor="let ws of wingSections(); let i = index">
        <g>
          <!-- TEMP layout: place 11 boxes in a grid -->
          <rect
            [attr.id]="ws.svgRegionId"
            class="region"
            [class.selected]="isSelected(ws)"
            [attr.x]="60 + (i % 4) * 200"
            [attr.y]="80 + row(i) * 90"
            width="160"
            height="60"
            rx="8"
            (click)="selectBySvg(ws.svgRegionId)"
          ></rect>

          <text
            class="label"
            [attr.x]="60 + (i % 4) * 200 + 10"
            [attr.y]="80 + row(i) * 90 + 38">
            {{ ws.name }}
          </text>
        </g>
      </ng-container>
    </svg>
  </section>
</div>
