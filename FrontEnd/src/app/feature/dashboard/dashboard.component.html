<h1 class="title">WorkTracker Dashboard</h1>

<!-- SEARCH BAR -->
<div class="search-bar">
  <select [(ngModel)]="searchWingSectionId">
    <option value="">All Wing Sections</option>
    <option *ngFor="let ws of wingSections()" [value]="ws.id">
      {{ ws.name }}
    </option>
  </select>

  <select [(ngModel)]="searchStatus">
    <option value="">All Statuses</option>
    <option value="CREATED">Created</option>
    <option value="IN_WORK">In Work</option>
    <option value="READY_FOR_INSPECTION">Ready for Inspection</option>
    <option value="READY_FOR_FINAL">Ready for Final</option>
    <option value="FINAL_APPROVED">Final Approved</option>
  </select>

  <button class="btn btn-primary" type="button" (click)="searchJobs()">Search</button>
  <button class="btn" type="button" (click)="clearSearch()">Clear</button>
</div>

<div class="layout">
  <!-- RIGHT: Wing Map + Selected Job -->
  <section class="panel svg-panel">
    <h2>Wing Map</h2>

    <!-- Wing SVG -->
    <svg viewBox="0 0 900 460" class="wing-svg" aria-label="Wing map">
      <rect x="20" y="40" width="860" height="360" class="frame"></rect>

      <ng-container *ngFor="let ws of wingSections(); let i = index">
        <g>
          <rect
            [attr.id]="ws.svgRegionId"
            class="region"
            [ngClass]="statusClassFor(ws.id)"
            [class.selected]="isSelected(ws)"
            [attr.x]="60 + (i % 4) * 200"
            [attr.y]="80 + row(i) * 90"
            width="160"
            height="60"
            rx="10"
            (click)="selectBySvg(ws.svgRegionId)">
          </rect>

          <text
            class="label"
            [attr.x]="60 + (i % 4) * 200 + 14"
            [attr.y]="80 + row(i) * 90 + 38">
            {{ ws.name }}
          </text>
        </g>
      </ng-container>
    </svg>

    <div class="divider"></div>

    <!-- HEADER -->
    <div class="jobs-header">
      <h3>Selected Job</h3>

      <div class="jobs-header-actions">
        <button
          type="button"
          class="btn"
          [disabled]="jobsLoading()"
          (click)="refreshJobs()">
          Refresh
        </button>

        <button (click)="downloadReport()">Download Report (CSV)</button>


        <button
          type="button"
          class="btn btn-primary"
          [disabled]="actionLoading()"
          (click)="openCreate()">
          Create Job
        </button>

        <button
          type="button"
          class="btn"
          (click)="logout()">
          Logout
        </button>


      </div>
    </div>

    <!-- CREATE FORM -->
    <div class="job-form" *ngIf="creating()">
      <div class="error" *ngIf="actionError()">{{ actionError() }}</div>

      <label>
        Wing Section
        <input class="input" [value]="formWingSectionId()" disabled />
      </label>

      <label>
        Employee ID
        <input
          class="input"
          type="number"
          [value]="formEmployeeId()"
          (input)="formEmployeeId.set($any($event.target).valueAsNumber)" />
      </label>

      <label>
        Title
        <input
          class="input"
          [value]="formTitle()"
          (input)="formTitle.set($any($event.target).value)" />
      </label>

      <label>
        Description
        <textarea
          class="input"
          rows="3"
          [value]="formDescription()"
          (input)="formDescription.set($any($event.target).value)">
        </textarea>
      </label>

      <div class="job-form-actions">
        <button type="button" class="btn" (click)="cancelForm()">Cancel</button>
        <button
          type="button"
          class="btn btn-primary"
          [disabled]="actionLoading()"
          (click)="submitCreate()">
          Save
        </button>
      </div>
    </div>

    <!-- LOADING / EMPTY -->
    <div *ngIf="jobsLoading()" class="muted">Loading jobs…</div>

    <div *ngIf="!jobsLoading() && selectedJobs().length === 0" class="muted">
      No job for this wing section yet.
    </div>

    <!-- SELECTED JOB CARD (no list, no scroll) -->
    <div class="job-card job-selected" *ngIf="!jobsLoading() && selectedJobs().length > 0">
      <div class="job-title">
        #{{ selectedJobs()[0].id }} — {{ selectedJobs()[0].title }}
      </div>

      <div class="job-meta">
        Status: <strong>{{ selectedJobs()[0].status }}</strong>
      </div>

      <div class="job-desc">
        {{ selectedJobs()[0].description }}
      </div>

      <div class="job-actions">
        <div class="error" *ngIf="actionError()">{{ actionError() }}</div>

        <button
          class="btn"
          [disabled]="actionLoading() || !canStartWork(selectedJobs()[0])"
          (click)="updateJobStatus(selectedJobs()[0].id, 'IN_WORK')">
          Start Work
        </button>

        <button
          class="btn"
          [disabled]="actionLoading() || !canRequestInspection(selectedJobs()[0])"
          (click)="requestInspection(selectedJobs()[0].id)">
          Request Inspection
        </button>

        <button
          class="btn"
          [disabled]="actionLoading() || !canRequestFinal(selectedJobs()[0])"
          (click)="requestFinal(selectedJobs()[0].id)">
          Request Final
        </button>

        <button
          class="btn btn-primary"
          [disabled]="actionLoading() || !canApproveFinal(selectedJobs()[0])"
          (click)="updateJobStatus(selectedJobs()[0].id, 'FINAL_APPROVED')">
          Approve Final
        </button>

        <button
          class="btn"
          [disabled]="actionLoading()"
          (click)="startEdit(selectedJobs()[0])">
          Edit
        </button>

        <button
          class="btn"
          [disabled]="actionLoading()"
          (click)="deleteJob(selectedJobs()[0].id)">
          Delete
        </button>
      </div>
    </div>
  </section>
</div>
